[package]
name = "dec-party-onboarding"
version = "0.1.0"
edition = "2024"

[profile.release]
opt-level = 3
strip = "debuginfo"
codegen-units = 1
lto = true
panic = "unwind"

[dependencies]
anyhow = { version = "1.0.98" }
bytes = { version = "1.9.0" }
clap = { version = "4.5.43", features = ["derive", "env", "string"] }
ed25519-dalek = { version = "2.1" }
hex = { version = "0.4" }
http = { version = "0.2" }
hyper = { version = "0.14", features = ["full"] }
hyper-noise = { version = "0.0.2" }
prost = { version = "0.14.1" }
prost-types = { version = "0.14.1" }
rand = { version = "0.8" }
secp256k1 = { version = "0.24.3", features = ["rand-std"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0" }
sha2 = { version = "0.10" }
thiserror = { version = "2.0" }
tokio = { version = "1.48.0", features = ["fs", "macros", "net", "rt-multi-thread", "signal"] }
tokio-noise = { version = "0.0.4" }
tokio-stream = { version = "0.1" }
toml = { version = "0.8" }
tonic = { version = "0.14.2" }
tonic-prost = { version = "0.14.2" }
tracing = { version = "0.1" }
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
uuid = { version = "1.11", features = ["v4"] }
x509-parser = { version = "0.16" }

[build-dependencies]
tonic-prost-build = { version = "0.14.2" }
walkdir = { version = "2.5.0" }

[dev-dependencies]
tempfile = { version = "3.14" }
