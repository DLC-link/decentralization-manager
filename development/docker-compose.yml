services:
  participant-1:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./participant-1/config:/config
      - ./participant-1/data:/data
      - ./participant-1/dars:/dars
    ports:
      - "8081:8081"
      - "9001:9001"
    entrypoint:
      [
        "dec-party-onboarding",
        "-c",
        "/config/node.toml",
        "serve",
        "--host",
        "0.0.0.0",
        "--port",
        "8081",
      ]

  participant-2:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./participant-2/config:/config
      - ./participant-2/data:/data
    ports:
      - "8082:8082"
      - "9002:9002"
    entrypoint:
      [
        "dec-party-onboarding",
        "-c",
        "/config/node.toml",
        "serve",
        "--host",
        "0.0.0.0",
        "--port",
        "8082",
      ]

  participant-3:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./participant-3/config:/config
      - ./participant-3/data:/data
    ports:
      - "8083:8083"
      - "9003:9003"
    entrypoint:
      [
        "dec-party-onboarding",
        "-c",
        "/config/node.toml",
        "serve",
        "--host",
        "0.0.0.0",
        "--port",
        "8083",
      ]
