      DECPM_PORT: "8082"
      DECPM_CANTON_ADMIN_HOST: host.docker.internal
      DECPM_CANTON_LEDGER_HOST: host.docker.internal
      DECPM_PUBLIC_ADDRESS: participant-2
    extra_hosts:
      - "host.docker.internal:host-gateway"
