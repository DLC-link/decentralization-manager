services:
  participant-1:
    build:
      context: ..
      dockerfile: Dockerfile
      ssh:
        - default
    volumes:
      - ./remote/participant-1/data:/app/data
    network_mode: host
    ports:
      - "8081:8081"
      - "9001:9001"
    env_file:
      - ./remote/participant-1/.env
    entrypoint:
      ["dec-party-manager", "-d", "/app", "serve", "--host", "0.0.0.0", "--port", "8081"]

  participant-2:
    build:
      context: ..
      dockerfile: Dockerfile
      ssh:
        - default
    volumes:
      - ./remote/participant-2/data:/app/data
    network_mode: host
    ports:
      - "8082:8082"
      - "9002:9002"
    env_file:
      - ./remote/participant-2/.env
    entrypoint:
      ["dec-party-manager", "-d", "/app", "serve", "--host", "0.0.0.0", "--port", "8082"]

  participant-3:
    build:
      context: ..
      dockerfile: Dockerfile
      ssh:
        - default
    volumes:
      - ./remote/participant-3/data:/app/data
    network_mode: host
    ports:
      - "8083:8083"
      - "9003:9003"
    env_file:
      - ./remote/participant-3/.env
    entrypoint:
      ["dec-party-manager", "-d", "/app", "serve", "--host", "0.0.0.0", "--port", "8083"]
