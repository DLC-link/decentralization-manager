name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTFLAGS: -D warnings

jobs:
  cargo:
    name: Format, Clippy & Unit Tests
    runs-on: ubuntu-8-core
    container: rust:slim-bookworm
    # Pin coverage instrumentation AND incremental at the job level so the
    # build, clippy, and coverage steps share one fingerprint and reuse
    # target/. Without RUSTFLAGS unified, the coverage step had
    # `-C instrument-coverage` while clippy had only `-D warnings` and
    # cargo invalidated the entire dep graph between them. Without
    # CARGO_INCREMENTAL pinned, code-coverage.sh sets it to 0 (required
    # for instrumented coverage) while the build/clippy steps default to
    # 1 — different fingerprint, full rebuild. 0 is the right value for
    # CI anyway: cache is restored fresh each run, so rustc's per-fn
    # incremental adds size and slowdown for no benefit.
    env:
      RUSTFLAGS: "-C instrument-coverage -D warnings"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq bc
      # The coverage step compiles with `-C instrument-coverage` (now job
      # env), so artifacts diverge from a plain debug build. Key includes
      # the workflow file so any RUSTFLAGS/profile/feature change in here
      # auto-invalidates: cargo's on-disk fingerprints embed RUSTFLAGS, so
      # restoring a target/ built with different flags forces a full
      # rebuild AND the combined cache action skips save on a primary-key
      # hit, which permanently poisons the entry. v2 prefix busts any
      # surviving stale entry from before this commit.
      - name: Cache cargo target (debug+coverage)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-debug-v2-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            cargo-target-debug-v2-
      # grcov is a fixed third-party tool. Build it once and cache the
      # binary so `cargo install grcov` (~30s) is skipped on every run.
      - name: Cache grcov binary
        id: cache-grcov
        uses: actions/cache@v4
        with:
          path: /usr/local/cargo/bin/grcov
          key: grcov-bin-v1
      - name: Install rustup components
        run: rustup component add rustfmt clippy llvm-tools-preview
      - name: cargo fmt
        run: cargo fmt -- --check
      # Build the test binaries first (rlibs + sidecar rmeta) so both
      # clippy and the coverage step reuse them. Without this priming,
      # `cargo clippy` runs in check mode (rmeta only) and `cargo test`
      # in code-coverage.sh then re-Compiles every dep as rlib — a full
      # second compile of the dep graph (~1m 40s) on every run, even
      # with a warm target cache.
      - name: cargo build (primes target/ for clippy + tests)
        run: cargo test --no-run --all-features
      # `--no-deps` keeps clippy lint passes scoped to workspace crates;
      # deps were just built above and don't need re-linting.
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --no-deps
      - name: Install coverage tooling
        if: steps.cache-grcov.outputs.cache-hit != 'true'
        run: cargo install grcov
      - name: Run tests with coverage
        run: ./code-coverage.sh

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-8-core
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # Per-profile target cache: integration-test compiles with the
      # `release-ci` profile and `test-mode` feature, which produces
      # artifacts disjoint from the cargo job's debug+coverage tree. Keep
      # a separate cache key so neither job clobbers the other's save.
      #
      # Split into restore + save steps because integration fails today
      # on a known chaos-test bug (fixed elsewhere) and the combined
      # `actions/cache@v4` only saves on job success — without the split,
      # `cargo build` warmed `target/release-ci` for nothing and every
      # run cold-built. `save-always: true` was deprecated. The save
      # step's `if: always() && cache-hit != 'true'` mirrors the v4
      # combined action's logic but lets us save on failure too.
      - name: Restore cargo target (release-ci)
        id: cargo-target-release-ci
        uses: actions/cache/restore@v4
        with:
          path: target
          key: cargo-target-release-ci-v2-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            cargo-target-release-ci-v2-
      - name: Cache localnet bundle
        uses: actions/cache@v4
        with:
          path: .localnet/
          key: localnet-0.5.17
      - name: Run integration tests
        run: ./integration-tests/run.sh
      - name: Save cargo target (release-ci)
        if: always() && steps.cargo-target-release-ci.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: target
          key: cargo-target-release-ci-v2-${{ hashFiles('Cargo.lock', 'Cargo.toml', '.github/workflows/ci.yml') }}

  daml:
    name: DAML Build & Test
    runs-on: ubuntu-8-core
    defaults:
      run:
        working-directory: daml
    steps:
      - uses: actions/checkout@v4
      # ~/.dpm holds the dpm CLI and the installed SDK toolchain. Cache
      # both so the install steps below short-circuit on a hit. Key on the
      # SDK version so a bump invalidates the cache automatically; keep
      # the install-script-driven steps so a cache miss still self-heals.
      - name: Cache dpm + DAML SDK
        id: cache-dpm
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-3.4.11
      - name: Install dpm
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: curl -sSL https://get.digitalasset.com/install/install.sh | sh
      - name: Install DAML SDK
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: ~/.dpm/bin/dpm install 3.4.11
      - name: Build
        run: ~/.dpm/bin/dpm build --all
      - name: Test governance-core
        run: cd governance-core-test && ~/.dpm/bin/dpm test
      - name: Test governance-token-custody
        run: cd governance-token-custody-test && ~/.dpm/bin/dpm test
