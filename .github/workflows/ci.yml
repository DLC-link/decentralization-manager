name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTFLAGS: -D warnings

jobs:
  cargo:
    name: Format, Clippy & Unit Tests
    runs-on: ubuntu-8-core
    container: rust:slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq bc
      - name: Install rustup components
        run: rustup component add rustfmt clippy llvm-tools-preview
      - name: cargo fmt
        run: cargo fmt -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features
      - name: Install coverage tooling
        run: cargo install grcov
      - name: Run tests with coverage
        run: ./code-coverage.sh

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-8-core
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache localnet bundle
        uses: actions/cache@v4
        with:
          path: .localnet/
          key: localnet-0.5.17
      - name: Run integration tests
        run: ./integration-tests/run.sh

  daml:
    name: DAML Build & Test
    runs-on: ubuntu-8-core
    defaults:
      run:
        working-directory: daml
    steps:
      - uses: actions/checkout@v4
      - name: Install dpm
        run: curl -sSL https://get.digitalasset.com/install/install.sh | sh
      - name: Install DAML SDK
        run: ~/.dpm/bin/dpm install 3.4.11
      - name: Build
        run: ~/.dpm/bin/dpm build --all
      - name: Test governance-core
        run: cd governance-core-test && ~/.dpm/bin/dpm test
      - name: Test governance-token-custody
        run: cd governance-token-custody-test && ~/.dpm/bin/dpm test
