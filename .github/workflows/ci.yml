name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTFLAGS: -D warnings

jobs:
  cargo:
    name: Format, Clippy & Unit Tests
    runs-on: ubuntu-latest # TEMP stopgap: ubuntu-8-core larger runners unavailable — revert once restored
    container: rust:slim-bookworm
    # Pin coverage instrumentation AND incremental at the job level so the
    # build, clippy, and coverage steps share one fingerprint and reuse
    # target/. Without RUSTFLAGS unified, the coverage step had
    # `-C instrument-coverage` while clippy had only `-D warnings` and
    # cargo invalidated the entire dep graph between them. Without
    # CARGO_INCREMENTAL pinned, code-coverage.sh sets it to 0 (required
    # for instrumented coverage) while the build/clippy steps default to
    # 1 — different fingerprint, full rebuild. 0 is the right value for
    # CI anyway: cache is restored fresh each run, so rustc's per-fn
    # incremental adds size and slowdown for no benefit.
    env:
      RUSTFLAGS: "-C instrument-coverage -D warnings"
      CARGO_INCREMENTAL: "0"
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # libwayland-dev: the `decman-cli` crate's rfd file-dialog backend
          # (ashpd) pulls in wayland-sys, whose build script needs the Wayland
          # client headers via pkg-config. This job builds the whole workspace
          # (--all-targets --all-features), decman-cli included.
          extra-packages: jq bc curl libwayland-dev
      # rust-cache trims target/ to only artifacts referenced by the
      # current Cargo.lock (drops orphaned rlibs, build script junk) and
      # auto-hashes rustc -V, RUSTFLAGS, CARGO_* env vars, and the
      # lockfile into the key. Cuts cache size to ~⅓, which dropped
      # post-cache save from ~3m to ~1m. The `key:` discriminator is
      # just a namespace tag — `cargo` job (debug + coverage) shouldn't
      # share a cache with the integration-test job (release-ci profile,
      # test-mode feature). cache-on-failure: true preserves a warm
      # cache when later steps fail (e.g. a flaky test).
      - name: Setup Rust target cache
        uses: Swatinem/rust-cache@v2
        with:
          key: debug-coverage
          cache-on-failure: "true"
      # grcov is a fixed third-party tool. Build it once and cache the
      # binary so `cargo install grcov` (~30s) is skipped on every run.
      # Pin the version: an unpinned `cargo install grcov` mixed with a
      # static cache key would mean cache-hit runs use whatever was
      # cached the first time and cache-miss runs may pull a newer one
      # — non-reproducible. Bumping the version requires bumping this
      # cache key in lockstep.
      - name: Cache grcov binary
        id: cache-grcov
        uses: actions/cache@v6
        with:
          path: /usr/local/cargo/bin/grcov
          key: grcov-bin-0.10.7
      - name: Install rustup components
        run: rustup component add rustfmt clippy llvm-tools-preview
      # The frontend's TS wire types are generated from the Rust DTOs (ts-rs).
      # Generate them before any build that runs build.rs (which builds the
      # frontend and needs this file). DECMAN_SKIP_FRONTEND so this generation
      # build doesn't itself try to build the frontend.
      - name: Generate frontend TypeScript bindings
        run: DECMAN_SKIP_FRONTEND=1 cargo run -p decman --all-features --bin gen-types
      - name: cargo fmt
        run: cargo fmt -- --check
      # Build the test binaries first (rlibs + sidecar rmeta) so both
      # clippy and the coverage step reuse them. Without this priming,
      # `cargo clippy` runs in check mode (rmeta only) and `cargo test`
      # in code-coverage.sh then re-Compiles every dep as rlib — a full
      # second compile of the dep graph (~1m 40s) on every run, even
      # with a warm target cache.
      - name: cargo build (primes target/ for clippy + tests)
        run: cargo test --no-run --all-features
      # `--no-deps` keeps clippy lint passes scoped to workspace crates;
      # deps were just built above and don't need re-linting. `-- -D warnings`
      # is stated explicitly (rather than relying solely on the job-level
      # RUSTFLAGS) so the gate matches the documented standard and can't be
      # silently weakened by an unrelated RUSTFLAGS change.
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features --no-deps -- -D warnings
      - name: Install coverage tooling
        if: steps.cache-grcov.outputs.cache-hit != 'true'
        run: cargo install grcov --version 0.10.7
      - name: Run tests with coverage
        run: ./code-coverage.sh

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest # TEMP stopgap: ubuntu-8-core larger runners unavailable — revert once restored
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup-build-env
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          extra-packages: jq curl
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # `release-ci` profile + test-mode feature produces artifacts
      # disjoint from the cargo job's debug+coverage tree, so rust-cache
      # gets its own discriminator. cache-on-failure: true is load-bearing
      # here — integration tests have known flakes on chaos phases and we
      # want a warm target/release-ci on the next run regardless.
      - name: Setup Rust target cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-ci
          cache-on-failure: "true"
      - name: Cache localnet bundle
        uses: actions/cache@v6
        with:
          path: .localnet/
          key: localnet-0.6.7
      # Generate the frontend TS bindings before the integration build (which
      # builds the decman binary → build.rs → frontend, needing this file).
      - name: Generate frontend TypeScript bindings
        run: DECMAN_SKIP_FRONTEND=1 cargo run -p decman --features typegen --bin gen-types
      - name: Run integration tests
        run: ./integration-tests/run.sh
        env:
          DPM_IT_LOG_DIR: ${{ github.workspace }}/it-node-logs
      - name: Upload node logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: it-node-logs
          path: it-node-logs/
          retention-days: 7

  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # Authenticate the private `common` git dependency over HTTPS using the
      # workflow GITHUB_TOKEN instead of a bot SSH deploy key. cargo-deny runs
      # on the host (not the action's Docker container) so this git credential
      # config is visible to cargo's dependency fetch.
      - name: Configure git auth for private deps
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "git@github.com:"
          git config --global --add \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "ssh://git@github.com/"
      - name: Install cargo-deny
        run: |
          VERSION=0.19.8
          curl --silent -L "https://github.com/EmbarkStudios/cargo-deny/releases/download/${VERSION}/cargo-deny-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz --strip-components=1 -C /usr/local/bin
      # Only `advisories` until a deny.toml is checked in; bans, licenses,
      # and sources need policy decisions to be useful.
      - name: cargo-deny check advisories
        run: cargo-deny check advisories

  daml:
    name: DAML Build & Test
    runs-on: ubuntu-latest # TEMP stopgap: ubuntu-8-core larger runners unavailable — revert once restored
    defaults:
      run:
        working-directory: daml
    steps:
      - uses: actions/checkout@v7
      # ~/.dpm holds the dpm CLI and the installed SDK toolchain. Cache
      # both so the install steps below short-circuit on a hit. Key on the
      # SDK version so a bump invalidates the cache automatically; keep
      # the install-script-driven steps so a cache miss still self-heals.
      - name: Cache dpm + DAML SDK
        id: cache-dpm
        uses: actions/cache@v6
        with:
          path: ~/.dpm
          key: dpm-3.4.11
      - name: Install dpm
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: curl -sSL https://get.digitalasset.com/install/install.sh | sh
      - name: Install DAML SDK
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: ~/.dpm/bin/dpm install 3.4.11
      - name: Build
        run: ~/.dpm/bin/dpm build --all
      - name: Test governance-core
        run: cd governance-core-test && ~/.dpm/bin/dpm test
      - name: Test governance-token-custody
        run: cd governance-token-custody-test && ~/.dpm/bin/dpm test
