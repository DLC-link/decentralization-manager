name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTFLAGS: -D warnings

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    container: rust:slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - run: rustup component add rustfmt
      - run: cargo fmt -- --check

  clippy:
    name: Clippy
    needs: fmt
    runs-on: ubuntu-latest
    container: rust:slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
      - run: rustup component add clippy
      - run: cargo clippy --all-targets --all-features

  test:
    name: Unit Tests
    needs: clippy
    runs-on: ubuntu-latest
    container: rust:slim-bookworm
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq bc
      - name: Install coverage tooling
        run: |
          rustup component add llvm-tools-preview
          cargo install grcov
      - name: Run tests with coverage
        run: ./code-coverage.sh

  integration-test:
    name: Integration Tests
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache localnet bundle
        uses: actions/cache@v4
        with:
          path: .localnet/
          key: localnet-0.5.17
      - name: Run integration tests
        run: ./integration-tests/run.sh

  daml:
    name: DAML Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: daml
    steps:
      - uses: actions/checkout@v4
      - name: Install dpm
        run: curl -sSL https://get.digitalasset.com/install/install.sh | sh
      - name: Install DAML SDK
        run: ~/.dpm/bin/dpm install 3.4.11
      - name: Build
        run: ~/.dpm/bin/dpm build --all
      - name: Test governance-core
        run: cd governance-core-test && ~/.dpm/bin/dpm test
      - name: Test governance-token-custody
        run: cd governance-token-custody-test && ~/.dpm/bin/dpm test
