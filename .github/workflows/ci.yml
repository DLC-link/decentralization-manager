name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_GIT_FETCH_WITH_CLI: true
  RUSTFLAGS: -D warnings

jobs:
  cargo:
    name: Format, Clippy & Unit Tests
    runs-on: ubuntu-8-core
    container: rust:slim-bookworm
    # Pin coverage instrumentation at the job level so clippy and the
    # coverage test run share a fingerprint. Without this, the test step
    # had `RUSTFLAGS=-C instrument-coverage` while clippy had only
    # `-D warnings`, so cargo invalidated the entire dep graph between
    # them and re-did ~3 min of work that clippy had just done.
    env:
      RUSTFLAGS: "-C instrument-coverage -D warnings"
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq bc
      # The coverage step compiles with `-C instrument-coverage` (now job
      # env), so artifacts diverge from a plain debug build; key on
      # `Cargo.lock + Cargo.toml` so profile/feature changes invalidate.
      - name: Cache cargo target (debug+coverage)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-debug-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            cargo-target-debug-
      # grcov is a fixed third-party tool. Build it once and cache the
      # binary so `cargo install grcov` (~30s) is skipped on every run.
      - name: Cache grcov binary
        id: cache-grcov
        uses: actions/cache@v4
        with:
          path: /usr/local/cargo/bin/grcov
          key: grcov-bin-v1
      - name: Install rustup components
        run: rustup component add rustfmt clippy llvm-tools-preview
      - name: cargo fmt
        run: cargo fmt -- --check
      - name: cargo clippy (also primes target/ for the coverage step)
        run: cargo clippy --all-targets --all-features
      - name: Install coverage tooling
        if: steps.cache-grcov.outputs.cache-hit != 'true'
        run: cargo install grcov
      - name: Run tests with coverage
        run: ./code-coverage.sh

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-8-core
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-build-env
        with:
          ssh-private-key: ${{ secrets.BOT_SSH_PRIVATE_KEY }}
          extra-packages: jq
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      # Per-profile target cache: integration-test compiles with the
      # `release-ci` profile and `test-mode` feature, which produces
      # artifacts disjoint from the cargo job's debug+coverage tree. Keep
      # a separate cache key so neither job clobbers the other's save.
      - name: Cache cargo target (release-ci)
        uses: actions/cache@v4
        with:
          path: target
          key: cargo-target-release-ci-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            cargo-target-release-ci-
      - name: Cache localnet bundle
        uses: actions/cache@v4
        with:
          path: .localnet/
          key: localnet-0.5.17
      - name: Run integration tests
        run: ./integration-tests/run.sh

  daml:
    name: DAML Build & Test
    runs-on: ubuntu-8-core
    defaults:
      run:
        working-directory: daml
    steps:
      - uses: actions/checkout@v4
      # ~/.dpm holds the dpm CLI and the installed SDK toolchain. Cache
      # both so the install steps below short-circuit on a hit. Key on the
      # SDK version so a bump invalidates the cache automatically; keep
      # the install-script-driven steps so a cache miss still self-heals.
      - name: Cache dpm + DAML SDK
        id: cache-dpm
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-3.4.11
      - name: Install dpm
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: curl -sSL https://get.digitalasset.com/install/install.sh | sh
      - name: Install DAML SDK
        if: steps.cache-dpm.outputs.cache-hit != 'true'
        run: ~/.dpm/bin/dpm install 3.4.11
      - name: Build
        run: ~/.dpm/bin/dpm build --all
      - name: Test governance-core
        run: cd governance-core-test && ~/.dpm/bin/dpm test
      - name: Test governance-token-custody
        run: cd governance-token-custody-test && ~/.dpm/bin/dpm test
