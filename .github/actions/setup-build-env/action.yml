name: Setup build environment
description: Install system deps, configure git auth for private deps, and cache cargo + npm artifacts.

inputs:
  github-token:
    description: Token used to fetch private git dependencies over HTTPS
    required: true
  extra-packages:
    description: Additional apt packages to install (space-separated)
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Detect environment
      id: env
      shell: bash
      run: |
        if [ "$(id -u)" = "0" ]; then
          echo "ssh-dir=/root/.ssh" >> $GITHUB_OUTPUT
          echo "cargo-registry=/usr/local/cargo/registry" >> $GITHUB_OUTPUT
          echo "cargo-git=/usr/local/cargo/git" >> $GITHUB_OUTPUT
          echo "sudo=" >> $GITHUB_OUTPUT
        else
          echo "ssh-dir=$HOME/.ssh" >> $GITHUB_OUTPUT
          echo "cargo-registry=$HOME/.cargo/registry" >> $GITHUB_OUTPUT
          echo "cargo-git=$HOME/.cargo/git" >> $GITHUB_OUTPUT
          echo "sudo=sudo" >> $GITHUB_OUTPUT
        fi

    - name: Install system dependencies
      shell: bash
      run: |
        ${{ steps.env.outputs.sudo }} apt-get update
        # libprotobuf-dev is the source of /usr/include/google/protobuf/*.proto;
        # protobuf-compiler only Recommends it, so under --no-install-recommends
        # we have to pull it in explicitly or canton-proto-rs's build.rs fails
        # with "google/protobuf/descriptor.proto: File not found".
        # Node is installed by actions/setup-node below, not via apt — Bookworm's
        # apt nodejs is 18.x, but Vite 8 / ESLint 10 / @vitejs/plugin-react 6
        # require Node 20.19+.
        ${{ steps.env.outputs.sudo }} apt-get install -y --no-install-recommends \
          pkg-config libssl-dev protobuf-compiler libprotobuf-dev \
          git openssh-client ca-certificates cmake \
          ${{ inputs.extra-packages }}

    - name: Setup Node
      uses: actions/setup-node@v5
      with:
        node-version: '22'

    # Fetch private git dependencies (e.g. canton-lib) over HTTPS using the
    # workflow GITHUB_TOKEN instead of a bot SSH deploy key — same approach as
    # the cargo-deny job. `CARGO_NET_GIT_FETCH_WITH_CLI=true` makes cargo shell
    # out to git, so this insteadOf rewrite is honored for dependency fetches.
    - name: Configure git auth for private deps
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git config --global \
          url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "git@github.com:"
        git config --global --add \
          url."https://x-access-token:${GH_TOKEN}@github.com/".insteadOf "ssh://git@github.com/"

    # Cargo registry/git caches are owned by Swatinem/rust-cache@v2 in
    # the calling workflow. Don't double-cache CARGO_HOME here — the two
    # actions would race on save and the manual key would lose to
    # rust-cache's smarter trimming.
    - name: Cache npm
      uses: actions/cache@v5
      with:
        path: frontend/node_modules
        key: npm-${{ hashFiles('frontend/package-lock.json') }}
