# Network-wide configuration shared by all participants
[network]
name = "cbtc-setup-network"
protocol_version = "1.0"
port = 9000
# Options: "explicit", "first", "election"
coordinator_strategy = "explicit"

# Coordinator node
[[participants]]
id = "coordinator-node"
name = "Coordinator Node"
role = "coordinator"
address = "10.0.1.100"
port = 9000
# Replace with actual public key from `cargo run -- keygen -o keys/coordinator.key`
public_key = "02c0011d1a70123456789abcdef0123456789abcdef0123456789abcdef01234567"

# Attestor 1
[[participants]]
id = "attestor-1"
name = "Attestor 1"
address = "10.0.1.101"
port = 9000
# Replace with actual public key from `cargo run -- keygen -o keys/attestor-1.key`
public_key = "02a1b2c3d4e5f6789012345678901234567890abcdef1234567890abcdef123456"

# Attestor 2
[[participants]]
id = "attestor-2"
name = "Attestor 2"
address = "10.0.1.102"
port = 9000
# Replace with actual public key from `cargo run -- keygen -o keys/attestor-2.key`
public_key = "02f6e5d4c3b2a1098765432109876543210fedcba098765432109876543210fed"

# Attestor 3
[[participants]]
id = "attestor-3"
name = "Attestor 3"
address = "10.0.1.103"
port = 9000
# Replace with actual public key from `cargo run -- keygen -o keys/attestor-3.key`
public_key = "021a2b3c4d5e6f098765432109876543210abcdef1234567890abcdef123456789"

[timeouts]
handshake_timeout_secs = 30
message_timeout_secs = 120
connection_retry_attempts = 3
connection_retry_delay_secs = 5

# Application-specific configuration
[application]
# Party ID prefix used for constructing decentralized party identifiers
# Format: "{party_id_prefix}::<namespace>"
party_id_prefix = "cbtc-network"

# Name prefix for namespace signing keys
namespace_key_name = "cbtc-network-namespace"

# Name prefix for DAML transaction signing keys
daml_key_name = "cbtc-network-daml-transactions"

# Party hint for operator party allocation (default: "operator")
operator_party_hint = "operator"

# Optional: Operator party ID (if not provided, will be allocated dynamically)
# operator_party = "DSO::1220..."

# Contract definitions to create after decentralized party setup
# Example contract definition:
# [[application.contracts]]
# id = "create-govR"
# name = "CBTCGovernanceRules"
