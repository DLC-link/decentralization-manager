syntax = "proto3";

package com.daml.ledger.api.v2;

import "google/protobuf/empty.proto";

// ==============================
// Identifier & naming utilities
// ==============================
//
// NOTE: Protobuf cannot enforce regex/length constraints;
// the following are API-level contracts:
//
// - NameString:          len <= 1000, matches [A-Za-z$_][A-Za-z0-9$_]*
// - PackageIdString:     len <= 64,  matches [A-Za-z0-9\\-_ ]+
// - PartyIdString:       len <= 255, matches [A-Za-z0-9:\\-_ ]+
// - LedgerString:        len <= 255, matches [A-Za-z0-9#:\\-_/ ]+
// - ApplicationIdString: len <= 255, matches [A-Za-z0-9#:\\-_/ @\\|]+

message Identifier {
  // The package/module/entity path of a type.
  // package_id: PackageIdString
  string package_id  = 1;

  // module_name: NameString
  string module_name = 2;

  // entity_name: NameString
  string entity_name = 3;
}

// ==============================
// Value and constituent types
// ==============================

message Value {
  // Encodes values accepted as command arguments and emitted as contract arguments.
  oneof sum {
    Record                 record       = 1;
    Variant                variant      = 2;

    // Identifier of an on-ledger contract. Must be a valid LedgerString.
    // Commands referencing an unknown or archived contract ID will fail.
    string                 contract_id  = 3;

    List                   list         = 4;

    // Signed 64-bit integer.
    sint64                 int64        = 5;

    // Decimal with precision 38 and scale 0..37.
    // Must match: [+-]?\\d{1,38}(\\.\\d{0,37})?
    // and be representable without loss of precision.
    string                 numeric      = 6;

    // UTF-8 string.
    string                 text         = 7;

    // Microseconds since UNIX epoch; can go backwards.
    // Range: 0001-01-01T00:00:00Z to 9999-12-31T23:59:59.999999Z
    // (compatible with RFC 3339 conversions).
    sfixed64               timestamp    = 8;

    // An agent operating on the ledger. Must be a valid PartyIdString.
    string                 party        = 9;

    bool                   bool         = 10;

    // Used e.g. for choices without arguments.
    google.protobuf.Empty  unit         = 11;

    // Days since UNIX epoch; can go backwards.
    // Limited to 0001-01-01 .. 9999-12-31 (RFC 3339 compatible range).
    int32                  date         = 12;

    // Optional value (None or Some). See Optional message below.
    Optional               optional     = 13;

    // Text-key map (see Map). Keys are Text; entries are in ascending key order.
    Map                    map          = 14;

    // Enum value (see Enum).
    Enum                   enum         = 15;

    // General map with arbitrary Value keys (see GenMap).
    GenMap                 gen_map      = 16;
  }
}

// A record value consisting of named fields, optionally identified by type.
message Record {
  // Optional type ID of the record.
  Identifier record_id = 1;

  repeated RecordField fields = 2;
}

message RecordField {
  // Optional field label (NameString). May be empty if positional only.
  string label = 1;

  // Field value.
  Value  value = 2;
}

// A variant (sum) carrying a constructor name and a single payload value.
message Variant {
  // Optional type ID of the variant.
  Identifier variant_id = 1;

  // Constructor name (NameString).
  string constructor = 2;

  // Constructor argument.
  Value  value = 3;
}

// Homogeneous list of values.
message List {
  repeated Value elements = 1;
}

// Optional value: when 'value' is unset/absent => None; if set => Some(value).
// (In JSON/gRPC, omitting the field encodes None.)
message Optional {
  Value value = 1; // present => Some(value)
}

// Text-key map. Keys are strings (Text), unique and sorted ascending.
// Encoded as an ordered list of entries.
message Map {
  message Entry {
    string key = 1; // Text key
    Value  value = 2;
  }
  repeated Entry entries = 1;
}

// Enum value identified by its type and chosen constructor.
message Enum {
  // Optional type ID of the enum.
  Identifier enum_id = 1;

  // Constructor (NameString).
  string constructor = 2;
}

// General map with arbitrary Value keys. Encoded as an ordered list of entries.
// Implementations may impose determinism/sorting constraints for equality.
message GenMap {
  message Entry {
    Value key = 1;
    Value value = 2;
  }
  repeated Entry entries = 1;
}
