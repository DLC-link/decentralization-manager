# Example configuration file for Canton workflow automation
# Copy this to config.toml and update with your values

[connection]
# Participant Admin API endpoint
# Used for: Uploading DARs, generating keys, topology management
admin_api_host = "localhost"
admin_api_port = 5012

# Participant Ledger API endpoint
# Used for: Submitting commands, reading ledger state
ledger_api_host = "localhost"
ledger_api_port = 5011

# OAuth token (optional, if authentication is required)
# token = "eyJ0eXAiOiJKV1QiLCJhbGciOiJSUzI1NiIsImtpZCI6IjEifQ..."

# Note: Sequencer ports (5001: public API, 5002: admin API) are not used
# by participant operations. Only connect to participant ports.

[topology]
# The name of the synchronizer to use
synchronizer = "global"
