# Network-wide configuration shared by all participants
[network]
name = "canton-onboarding-network"
protocol_version = "1.0"
port = 9000
coordinator_strategy = "explicit"

# Coordinator - Participant 1
[[participants]]
id = "participant-1"
name = "Participant 1 (Coordinator)"
role = "coordinator"
address = "localhost"
port = 9001
public_key = "0255e519aa8511485c5641688bf60dab74606aae17e62da7050878fe55c905cd78" # participant-1

# Attestor - Participant 2
[[participants]]
id = "participant-2"
name = "Participant 2"
address = "localhost"
port = 9002
public_key = "021a2852a331ba3f3d4a50faaa3bf6e59326369ea44c3771d074acb10d43e412f4" # participant-2

# Attestor - Participant 3
[[participants]]
id = "participant-3"
name = "Participant 3"
address = "localhost"
port = 9003
public_key = "030d8d4d5ca7c6c27d946a7b7081831ffb73b9f5cd694a6e62f4f15005feb8ca6a" # participant-3

[timeouts]
handshake_timeout_secs = 30
message_timeout_secs = 120
connection_retry_attempts = 3
connection_retry_delay_secs = 5

[security]
require_all_participants = true
minimum_participants = 3
