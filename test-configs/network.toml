# Network-wide configuration shared by all participants
[network]
name = "canton-onboarding-network"
protocol_version = "1.0"
port = 9000
coordinator_strategy = "explicit"
operator_party = "DSO::1220f70dd748844ea7a902ae0dae7155377bbdec7f945092a137d43433dd5f796731"

# Coordinator - Participant 1
[[participants]]
id = "app-user"
name = "Participant 1 (Coordinator)"
role = "coordinator"
address = "localhost"
port = 9001
public_key = "02c3e59d9e5d2a88c8a3aa11eda40cda777d128fd659db49982c06166195e6f039" # participant-1

# Attestor - Participant 2
[[participants]]
id = "app-provider"
name = "Participant 2"
address = "localhost"
port = 9002
public_key = "034b6179022f5c2dfeb0c8cc3902223413bdd27a5145595cb9a72000c0f5d0e425" # participant-2

# Attestor - Participant 3
[[participants]]
id = "sv"
name = "Participant 3"
address = "localhost"
port = 9003
public_key = "02829a9e9e31b628d30a69f1c904a7b3be9e950c65683130ae55ae67fe8a3a41d2" # participant-3

[timeouts]
handshake_timeout_secs = 30
message_timeout_secs = 120
connection_retry_attempts = 3
connection_retry_delay_secs = 5

# Application-specific configuration
[application]
party_id_prefix = "cbtc-network"
namespace_key_name = "cbtc-network-namespace"
daml_key_name = "cbtc-network-daml-transactions"
operator_party_hint = "operator"

# Contract definitions for governance setup
[[application.contracts]]
id = "create-govR"
name = "CBTCGovernanceRules"
package_id = "#cbtc-governance"
module_name = "CBTC.Governance"
entity_name = "CBTCGovernanceRules"
fields = [
    { type = "decentralized_party" },
    { type = "operator_party" },
    { type = "instrument", id = "CBTC" },
    { type = "record", fields = [{ type = "attestors_set" }] },
    { type = "optional", inner = { type = "governance_threshold" } },
]

[[application.contracts]]
id = "create-daR"
name = "CBTCDepositAccountRules"
package_id = "#cbtc"
module_name = "CBTC.DepositAccount"
entity_name = "CBTCDepositAccountRules"
fields = [
    { type = "decentralized_party" },
    { type = "operator_party" },
    { type = "instrument", id = "CBTC" },
]

[[application.contracts]]
id = "create-waR"
name = "CBTCWithdrawAccountRules"
package_id = "#cbtc"
module_name = "CBTC.WithdrawAccount"
entity_name = "CBTCWithdrawAccountRules"
fields = [
    { type = "decentralized_party" },
    { type = "operator_party" },
    { type = "instrument", id = "CBTC" },
]
