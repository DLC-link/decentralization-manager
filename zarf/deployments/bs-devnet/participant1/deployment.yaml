apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dec-party-manager-1-data
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
    app.kubernetes.io/component: coordinator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dec-party-manager
      app.kubernetes.io/instance: participant-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dec-party-manager
        app.kubernetes.io/instance: participant-1
        app.kubernetes.io/component: coordinator
    spec:
      initContainers:
        - name: init-data
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /app/data"]
          volumeMounts:
            - name: data
              mountPath: /app
      containers:
        - name: dec-party-manager
          image: public.ecr.aws/dlc-link/canton-decparty-manager:0.1.7
          imagePullPolicy: Always
          command:
            [
              "dec-party-manager",
              "-d",
              "/app",
              "serve",
              "--host",
              "0.0.0.0",
              "--port",
              "8080",
            ]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: noise
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          env:
            - name: RUST_LOG
              value: dec_party_manager=info,tokio_noise=error,hyper_noise=error
          envFrom:
            - secretRef:
                name: dec-party-manager-1-secrets
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dec-party-manager-1-data
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: noise
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-1-noise
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    external-dns.alpha.kubernetes.io/hostname: "dec-party-manager-1-noise.devnet.bitsafe.finance"
spec:
  type: LoadBalancer
  ports:
    - name: noise
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
---
# Admin UI is exposed on the tailnet only, at
# https://dec-party-manager-1-devnet.tailab5f35.ts.net (MagicDNS + Tailscale
# HTTPS cert, provisioned by the Tailscale operator from spec.tls[0].hosts[0]).
#
# It is deliberately NOT public: the only users are operators who already hold
# Tailscale access (they need it to reach Keycloak at keycloak-devnet.tailab5f35
# .ts.net). Serving the UI on a public domain broke login — the browser's Local
# Network Access policy blocks a public-origin page from reaching the tailnet
# (CGNAT) Keycloak token endpoint. Same address space on both ends avoids it.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
  annotations:
    tailscale.com/tags: "tag:k8s-devnet,tag:nontech-exposed"
spec:
  ingressClassName: tailscale
  defaultBackend:
    service:
      name: dec-party-manager-1
      port:
        number: 80
  tls:
    - hosts:
        - dec-party-manager-1-devnet
