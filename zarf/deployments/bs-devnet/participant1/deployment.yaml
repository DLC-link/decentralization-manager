apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dec-party-manager-1-data
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: gp2
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
    app.kubernetes.io/component: coordinator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: dec-party-manager
      app.kubernetes.io/instance: participant-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dec-party-manager
        app.kubernetes.io/instance: participant-1
        app.kubernetes.io/component: coordinator
    spec:
      initContainers:
        - name: init-data
          image: busybox:latest
          command: ["sh", "-c", "mkdir -p /app/data"]
          volumeMounts:
            - name: data
              mountPath: /app
      containers:
        - name: dec-party-manager
          image: public.ecr.aws/dlc-link/canton-decparty-manager:0.1.3
          imagePullPolicy: Always
          command:
            [
              "dec-party-manager",
              "-d",
              "/app",
              "serve",
              "--host",
              "0.0.0.0",
              "--port",
              "8080",
            ]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: noise
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          env:
            - name: RUST_LOG
              value: dec_party_manager=info,tokio_noise=error,hyper_noise=error
          envFrom:
            - secretRef:
                name: dec-party-manager-1-secrets
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: dec-party-manager-1-data
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: noise
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-1-noise
  namespace: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    external-dns.alpha.kubernetes.io/hostname: "dec-party-manager-1-noise.devnet.bitsafe.finance"
spec:
  type: LoadBalancer
  ports:
    - name: noise
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: dec-party-manager-1
  namespace: dec-party-manager-1
spec:
  parentRefs:
    - name: main-gateway
      namespace: envoy-gateway-system
  hostnames:
    - dec-party-manager-1.devnet.bitsafe.finance
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: dec-party-manager-1
          port: 80
