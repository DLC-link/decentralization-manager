apiVersion: v1
kind: ConfigMap
metadata:
  name: dec-party-manager-3-config
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-3
data:
  node.toml: |
    [node]
    participant_id = "iBTC-validator-3::1220d544125d3619e9c4d7340466a78a85f738e75a740837fa6283a1051494f5df23"
    listen_address = "0.0.0.0"
    public_address = "dec-party-manager-3.catalyst-canton.svc.cluster.local"
    port = 9000

    [canton]
    admin_api_host = "participant-ibtc-devnet-3.catalyst-canton.svc.cluster.local"
    admin_api_port = 5002
    ledger_api_host = "participant-ibtc-devnet-3.catalyst-canton.svc.cluster.local"
    ledger_api_port = 5001
    ledger_api_user_id = ""
    synchronizer = "global"

    [timeouts]
    handshake_timeout_secs = 30
    message_timeout_secs = 120
    connection_retry_attempts = 3
    connection_retry_delay_secs = 5

    [[parties]]
    dec_party_id = "cbtc-network::12202a83c6f4082217c175e29bc53da5f2703ba2675778ab99217a5a881a949203ff"
    member_party_id = "attestor-3::1220d544125d3619e9c4d7340466a78a85f738e75a740837fa6283a1051494f5df23"
    user_id = "attestorUser3"

    [parties.keycloak]
    url = "https://keycloak.dev.canton.ibtc.network"
    realm = "ibtc-catalyst-devnet"
    client_id = "attestor-3"
    client_secret = "1AY5fFw9iCiDYWiJhsMkJ9VgIJBQSoEN"

    [[parties]]
    dec_party_id = "vault-test::1220d12b8a4e2f440d86f46764afcfc8d9908de35f90b36bc19efcd8e198606c94d2"
    member_party_id = "attestor-3::1220d544125d3619e9c4d7340466a78a85f738e75a740837fa6283a1051494f5df23"
    user_id = "attestorUser3"

    [parties.keycloak]
    url = "https://keycloak.dev.canton.ibtc.network"
    realm = "ibtc-catalyst-devnet"
    client_id = "attestor-3"
    client_secret = "1AY5fFw9iCiDYWiJhsMkJ9VgIJBQSoEN"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dec-party-manager-3-data
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-3
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dec-party-manager-3
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-3
    app.kubernetes.io/component: attestor
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dec-party-manager
      app.kubernetes.io/instance: participant-3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dec-party-manager
        app.kubernetes.io/instance: participant-3
        app.kubernetes.io/component: attestor
    spec:
      initContainers:
        - name: copy-config
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              mkdir -p /app/config /app/data
              cp /config-readonly/* /app/config/
              echo "Config copied to persistent storage"
          volumeMounts:
            - name: config
              mountPath: /config-readonly
            - name: data
              mountPath: /app
          env:
            - name: RUST_LOG
              value: dec_party_manager=debug,tokio_noise=error,hyper_noise=error
      containers:
        - name: dec-party-manager
          image: public.ecr.aws/dlc-link/canton-decparty-manager:0.0.19
          imagePullPolicy: Always
          command:
            [
              "dec-party-manager",
              "-d",
              "/app",
              "serve",
              "--host",
              "0.0.0.0",
              "--port",
              "8080",
            ]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: noise
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /app
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: dec-party-manager-3-config
        - name: data
          persistentVolumeClaim:
            claimName: dec-party-manager-3-data
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-3
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-3
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP
    - name: noise
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-3
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dec-party-manager-3-ingress
  namespace: catalyst-canton
spec:
  ingressClassName: traefik
  rules:
    - host: dec-party-manager-3.dev.canton.ibtc.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dec-party-manager-3
                port:
                  number: 80
