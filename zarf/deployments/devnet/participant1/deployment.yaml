apiVersion: v1
kind: ConfigMap
metadata:
  name: dec-party-manager-1-config
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
data:
  network.toml: |
    [network]
    name = "canton-onboarding-network"
    protocol_version = "1.0"
    coordinator_strategy = "explicit"
    operator_party = "DSO::1220f70dd748844ea7a902ae0dae7155377bbdec7f945092a137d43433dd5f796731"

    [[participants]]
    id = "participant-ibtc-devnet-1"
    name = "Participant 1 (Coordinator)"
    role = "coordinator"
    address = "participant-ibtc-devnet-1.catalyst-canton.svc.cluster.local"
    port = 9000
    public_key = "03fe1929cb1c78f25fd05f7f2b77424b1764c9708d59bfb3743df6ec6aaf8579a7"

    [[participants]]
    id = "participant-ibtc-devnet-2"
    name = "Participant 2"
    address = "participant-ibtc-devnet-2.catalyst-canton.svc.cluster.local"
    port = 9000
    public_key = "02de4346dc38f8f76182ed12abce70671547fbfefd49401278f5836ad73f43ae9f"

    [[participants]]
    id = "participant-ibtc-devnet-3"
    name = "Participant 3"
    address = "participant-ibtc-devnet-3.catalyst-canton.svc.cluster.local"
    port = 9000
    public_key = "03e96a78e81787e797fbc87da4492c4688a879e96c399138a8d3583cbe8a709dd7"

    [timeouts]
    handshake_timeout_secs = 30
    message_timeout_secs = 120
    connection_retry_attempts = 3
    connection_retry_delay_secs = 5

    [application]
    party_id_prefix = "cbtc-network"
    namespace_key_name = "cbtc-network-namespace"
    daml_key_name = "cbtc-network-daml-transactions"
    operator_party_hint = "operator"

  node.toml: |
    network_config = "network.toml"

    [node]
    node_id = "participant-ibtc-devnet-1"
    listen_address = "0.0.0.0"

    [canton]
    admin_api_host = "participant-ibtc-devnet-1.catalyst-canton.svc.cluster.local"
    admin_api_port = 5002
    ledger_api_host = "participant-ibtc-devnet-1.catalyst-canton.svc.cluster.local"
    ledger_api_port = 5001
    ledger_api_user_id = ""
    synchronizer = "global"
---
apiVersion: v1
kind: Secret
metadata:
  name: dec-party-manager-1-keys
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
type: Opaque
stringData:
  participant-ibtc-devnet-1.key: "5138dc5e38d3c641666f92b435a9853f37baead3e7dc7b538f59e3c93362bde7"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: dec-party-manager-1-data
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dec-party-manager-1
  namespace: catalyst-canton
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
    app.kubernetes.io/component: coordinator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dec-party-manager
      app.kubernetes.io/instance: participant-1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dec-party-manager
        app.kubernetes.io/instance: participant-1
        app.kubernetes.io/component: coordinator
    spec:
      containers:
        - name: dec-party-manager
          image: public.ecr.aws/dlc-link/canton-decparty-manager:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: noise
              containerPort: 9000
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: keys
              mountPath: /data/keys
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: dec-party-manager-1-config
        - name: keys
          secret:
            secretName: dec-party-manager-1-keys
        - name: data
          persistentVolumeClaim:
            claimName: dec-party-manager-1-data
---
apiVersion: v1
kind: Service
metadata:
  name: dec-party-manager-1
  labels:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
  selector:
    app.kubernetes.io/name: dec-party-manager
    app.kubernetes.io/instance: participant-1
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dec-party-manager-1-ingress
  namespace: catalyst-canton
spec:
  ingressClassName: traefik
  rules:
    - host: dec-party-manager-1.dev.canton.ibtc.network
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dec-party-manager-1
                port:
                  number: 80
