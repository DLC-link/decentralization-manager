# cargo-audit reads Cargo.lock directly and flags every advisory it finds,
# even for crates that are gated behind disabled features and never compiled
# in this workspace. cargo-deny respects feature gating and does not flag
# them, so each ignore here documents exactly why the audit-only finding is
# not reachable.

[advisories]
ignore = [
  # rsa is pulled in only via sqlx-mysql, which is an optional sqlx
  # dependency that we do not enable (default-features = false, only
  # "sqlite" backend is on). Marvin requires an attacker to observe RSA
  # decryption timing over the network; we do not decrypt RSA anywhere.
  "RUSTSEC-2023-0071",
  # paste is unmaintained (not a vulnerability), pulled in transitively only
  # by ratatui (the decman-cli TUI). Trivial compile-time proc-macro, no
  # runtime/security surface. Mirrors the ignore in deny.toml.
  "RUSTSEC-2024-0436",
]
