services:
  participant-1:
    image: dec-party-onboarding
    volumes:
      - ./test-configs:/config
    ports:
      - "8081:8080"
      - "9001:9001"
    entrypoint: ["dec-party-onboarding", "-c", "/config/node-1.toml", "serve", "--host", "0.0.0.0", "--port", "8080"]

  participant-2:
    image: dec-party-onboarding
    volumes:
      - ./test-configs:/config
    ports:
      - "8082:8080"
      - "9002:9002"
    entrypoint: ["dec-party-onboarding", "-c", "/config/node-2.toml", "serve", "--host", "0.0.0.0", "--port", "8080"]

  participant-3:
    image: dec-party-onboarding
    volumes:
      - ./test-configs:/config
    ports:
      - "8083:8080"
      - "9003:9003"
    entrypoint: ["dec-party-onboarding", "-c", "/config/node-3.toml", "serve", "--host", "0.0.0.0", "--port", "8080"]
